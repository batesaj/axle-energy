sensor:

# ═══════════════════════════════════════════════════════════════
# SECTION 1 — SOLAR FORECASTING
# ═══════════════════════════════════════════════════════════════

  - name: AXLE Cloud Factor
    unique_id: axle_cloud_factor
    state: >
      {% set cloud = state_attr('sensor.solar_weather_raw', 'cloud_cover') %}
      {% if cloud is none or cloud | length == 0 %}
        0.5
      {% else %}
        {% set h = now().hour %}
        {% set c = cloud[h] | float(50) %}
        {{ (1 - (c / 100)) | round(2) }}
      {% endif %}

  - name: AXLE Solar Geometry Factor
    unique_id: axle_solar_geometry_factor
    state: >
      {% set h = now().hour %}
      {% if 11 <= h <= 14 %} 1.0
      {% elif 9 <= h <= 16 %} 0.8
      {% elif 7 <= h <= 18 %} 0.5
      {% else %} 0.0
      {% endif %}

  - name: Solar Forecast kWh
    unique_id: solar_forecast_kwh
    unit_of_measurement: "kWh"
    state: >
      {% set rad = state_attr('sensor.solar_weather_raw', 'shortwave_radiation') %}
      {% set cloud = state_attr('sensor.solar_weather_raw', 'cloud_cover') %}
      {% if rad is none or cloud is none %}
        0
      {% else %}
        {% set total = namespace(v=0) %}
        {% for i in range(24) %}
          {% set r = rad[i] | float(0) %}
          {% set c = cloud[i] | float(0) %}
          {% set total.v = total.v + (r / 1000) * ((100 - c) / 100) %}
        {% endfor %}
        {{ total.v | round(2) }}
      {% endif %}

  - name: AXLE Solar Forecast Corrected
    unique_id: axle_solar_forecast_corrected
    unit_of_measurement: "kWh"
    state: >
      {% set base = states('sensor.solar_forecast_kwh') | float(0) %}
      {% set cloud = states('sensor.axle_cloud_factor') | float(1) %}
      {% set geo = states('sensor.axle_solar_geometry_factor') | float(1) %}
      {{ (base * cloud * geo) | round(2) }}

  - name: AXLE PV Baseline Display
    unique_id: axle_pv_baseline_display
    unit_of_measurement: "W"
    state: "{{ states('input_number.axle_pv_baseline') | float(0) }}"


# ═══════════════════════════════════════════════════════════════
# SECTION 2 — INSIGHT & HEALTH
# ═══════════════════════════════════════════════════════════════

  - name: AXLE Export Window State
    unique_id: axle_export_window_state
    state: >
      {% set export = states('sensor.YOUR_GIVENERGY_SERIAL_export_power') | float(0) %}
      {% set soc = states('sensor.YOUR_GIVENERGY_SERIAL_soc') | float(0) %}
      {% set export_rate = states('sensor.octopus_energy_electricity_YOUR_EXPORT_MPAN_export_current_rate') | float(0) %}
      {% if export > 500 and soc > 20 and export_rate > 0.20 %}
        EXPORT_ACTIVE
      {% elif export > 200 and soc > 20 %}
        EXPORT_WEAK
      {% elif export_rate > 0.20 and soc > 60 %}
        EXPORT_READY
      {% else %}
        NO_EXPORT
      {% endif %}

  - name: Cost Insight
    unique_id: cost_insight
    state: >
      {% set rate = states('sensor.octopus_energy_electricity_YOUR_IMPORT_MPAN_current_rate') | float(0) %}
      {% if rate < 0.16 %}    CHEAP
      {% elif rate > 0.28 %}  EXPENSIVE
      {% else %}              NORMAL
      {% endif %}

  - name: Energy Insight
    unique_id: energy_insight
    state: >
      {% set export = states('sensor.YOUR_GIVENERGY_SERIAL_export_power') | float(0) %}
      {% set imp = states('sensor.YOUR_GIVENERGY_SERIAL_import_power') | float(0) %}
      {% set soc = states('sensor.YOUR_GIVENERGY_SERIAL_soc') | float(0) %}
      {% set solar = states('sensor.YOUR_GIVENERGY_SERIAL_pv_power') | float(0) %}
      {% if export > 1000 and soc < 50 %}  EXPORT_WARNING
      {% elif imp > 1000 and soc > 40 %}   IMPORT_WARNING
      {% elif soc > 90 and solar > 2000 %} EXPORT_READY
      {% elif soc < 20 %}                  BATTERY_LOW
      {% elif solar > 3000 %}              SOLAR_SURPLUS
      {% else %}                           OPTIMAL
      {% endif %}

  - name: Energy System Health
    unique_id: energy_system_health
    state: >
      {% set checks = [
        states('sensor.YOUR_GIVENERGY_SERIAL_soc'),
        states('sensor.YOUR_GIVENERGY_SERIAL_pv_power'),
        states('sensor.YOUR_GIVENERGY_SERIAL_load_power'),
        states('sensor.solar_weather_raw'),
        states('sensor.axle_v3_status')
      ] %}
      {% set bad = checks | select('in', ['unknown', 'unavailable', '']) | list %}
      {% if bad | length > 0 %}
        DEGRADED
      {% else %}
        OK
      {% endif %}

  - name: AXLE Forecast Confidence
    unique_id: axle_forecast_confidence
    unit_of_measurement: "%"
    state: >
      {% set error = states('input_number.axle_soc_forecast_error') | float(0) %}
      {% set cloud = state_attr('sensor.solar_weather_raw', 'cloud_cover') %}
      {% set weather_ok = cloud is not none %}
      {% set score = 100 %}
      {% set score = score - ([error | abs, 40] | min) %}
      {% if not weather_ok %}
        {% set score = score - 30 %}
      {% endif %}
      {{ [score, 0] | max | round(0) | int }}


# ═══════════════════════════════════════════════════════════════
# SECTION 3 — AXLE EVENT DETECTION
# ═══════════════════════════════════════════════════════════════

  - name: AXLE Export Window Active
    unique_id: axle_export_window_active
    state: >
      {% set mode = states('select.YOUR_GIVENERGY_SERIAL_mode') %}
      {% set export = states('sensor.YOUR_GIVENERGY_SERIAL_export_power') | float(0) %}
      {% set battery = states('sensor.YOUR_GIVENERGY_SERIAL_battery_power') | float(0) %}
      {% if mode == 'Timed Demand' and export > 2000 and battery > 0 %}
        on
      {% else %}
        off
      {% endif %}

  - name: AXLE Event State
    unique_id: axle_event_state
    state: >
      {% set mode = states('select.YOUR_GIVENERGY_SERIAL_mode') %}
      {% set export = states('sensor.YOUR_GIVENERGY_SERIAL_export_power') | float(0) %}
      {% set battery = states('sensor.YOUR_GIVENERGY_SERIAL_battery_power') | float(0) %}
      {% set pv = states('sensor.YOUR_GIVENERGY_SERIAL_pv_power') | float(0) %}
      {% if mode == 'Timed Demand' and export > 2000 and battery > 0 %}
        AXLE_EXPORTING
      {% elif mode == 'Timed Demand' and export > 500 %}
        AXLE_EXPORT_STARTING
      {% elif mode not in ['Eco', 'unknown'] and export > 1000 %}
        AXLE_SUSPECTED
      {% elif battery < -500 and pv > 1000 %}
        SOLAR_RECOVERY
      {% else %}
        NORMAL
      {% endif %}

  - name: AXLE Solar Export Contribution
    unique_id: axle_solar_export_contribution
    unit_of_measurement: "W"
    state: >
      {% set pv = states('sensor.YOUR_GIVENERGY_SERIAL_pv_power') | float(0) %}
      {% set load = states('sensor.YOUR_GIVENERGY_SERIAL_load_power') | float(0) %}
      {{ [pv - load, 0] | max | round(0) | int }}

  - name: AXLE Battery Export Contribution
    unique_id: axle_battery_export_contribution
    unit_of_measurement: "W"
    state: >
      {% set battery = states('sensor.YOUR_GIVENERGY_SERIAL_battery_power') | float(0) %}
      {{ [battery, 0] | max | round(0) | int }}

  - name: AXLE Export Limit Headroom
    unique_id: axle_export_limit_headroom
    unit_of_measurement: "W"
    state: >
      {% set export = states('sensor.YOUR_GIVENERGY_SERIAL_export_power') | float(0) %}
      {% set limit = states('sensor.YOUR_GIVENERGY_SERIAL_export_limit') | float(4500) %}
      {{ [limit - export, 0] | max | round(0) | int }}

  - name: AXLE Solar Cutout Risk
    unique_id: axle_solar_cutout_risk
    state: >
      {% set headroom = states('sensor.axle_export_limit_headroom') | float(0) %}
      {% set active = states('sensor.axle_export_window_active') %}
      {% if active == 'on' and headroom < 200 %}
        HIGH
      {% elif active == 'on' and headroom < 500 %}
        MEDIUM
      {% elif active == 'on' %}
        LOW
      {% else %}
        NONE
      {% endif %}

  - name: AXLE Free Energy Opportunity
    unique_id: axle_free_energy_opportunity
    state: >
      {% set rate = states('sensor.octopus_energy_electricity_YOUR_IMPORT_MPAN_current_rate') | float(0) %}
      {% set next_rate = states('sensor.octopus_energy_electricity_YOUR_IMPORT_MPAN_next_rate') | float(0) %}
      {% set soc = states('sensor.YOUR_GIVENERGY_SERIAL_soc') | float(0) %}
      {% set export = states('sensor.YOUR_GIVENERGY_SERIAL_export_power') | float(0) %}
      {% if soc >= 98 and export > 500 %}
        IGNORE_EXPORTING_FULL
      {% elif rate <= 0 %}
        FREE_NOW
      {% elif next_rate <= 0 %}
        FREE_NEXT_SLOT
      {% elif rate < 0.05 %}
        VERY_CHEAP_NOW
      {% elif next_rate < 0.05 %}
        VERY_CHEAP_NEXT_SLOT
      {% else %}
        NONE
      {% endif %}


# ═══════════════════════════════════════════════════════════════
# SECTION 4 — AXLE v3 CONTEXTUAL INTELLIGENCE
# ═══════════════════════════════════════════════════════════════

  - name: AXLE Ambient Temp Now
    unique_id: axle_ambient_temp_now
    unit_of_measurement: "°C"
    state: >
      {% set temps = state_attr('sensor.solar_weather_raw', 'temperature_2m') %}
      {% if temps is none or temps | length == 0 %}
        10
      {% else %}
        {% set h = now().hour %}
        {{ temps[h] | float(10) | round(1) }}
      {% endif %}

  - name: AXLE Ambient Temp Forecast Low
    unique_id: axle_ambient_temp_forecast_low
    unit_of_measurement: "°C"
    state: >
      {% set temps = state_attr('sensor.solar_weather_raw', 'temperature_2m') %}
      {% if temps is none or temps | length == 0 %}
        8
      {% else %}
        {{ temps[:24] | min | round(1) }}
      {% endif %}

  - name: AXLE Ambient Temp Forecast High
    unique_id: axle_ambient_temp_forecast_high
    unit_of_measurement: "°C"
    state: >
      {% set temps = state_attr('sensor.solar_weather_raw', 'temperature_2m') %}
      {% if temps is none or temps | length == 0 %}
        15
      {% else %}
        {{ temps[:24] | max | round(1) }}
      {% endif %}

  - name: AXLE Heating Demand Predicted
    unique_id: axle_heating_demand_predicted
    state: >
      {% set low = states('sensor.axle_ambient_temp_forecast_low') | float(10) %}
      {% if low < 5 %}    HIGH
      {% elif low < 10 %} MEDIUM
      {% elif low < 15.5 %} LOW
      {% else %}          NONE
      {% endif %}

  - name: AXLE Day Type
    unique_id: axle_day_type
    state: >
      {% set dow = now().strftime('%A') %}
      {% set workday = is_state('binary_sensor.workday', 'on') %}
      {% if not workday and dow not in ['Saturday', 'Sunday'] %}
        BANK_HOLIDAY
      {% elif dow == 'Saturday' %}
        SATURDAY
      {% elif dow == 'Sunday' %}
        SUNDAY
      {% else %}
        {{ dow | upper }}
      {% endif %}

  - name: AXLE Solar Start Hour
    unique_id: axle_solar_start_hour
    unit_of_measurement: "h"
    state: >
      {% set rising = state_attr('sun.sun', 'next_rising') %}
      {% if rising is none %}
        7
      {% else %}
        {{ as_datetime(rising).hour }}
      {% endif %}

  - name: AXLE Solar End Hour
    unique_id: axle_solar_end_hour
    unit_of_measurement: "h"
    state: >
      {% set setting = state_attr('sun.sun', 'next_setting') %}
      {% if setting is none %}
        20
      {% else %}
        {{ as_datetime(setting).hour }}
      {% endif %}

  - name: AXLE Weather Condition
    unique_id: axle_weather_condition
    state: >
      {% set codes = state_attr('sensor.solar_weather_raw', 'weathercode') %}
      {% if codes is none or codes | length == 0 %}
        UNKNOWN
      {% else %}
        {% set h = now().hour %}
        {% set code = codes[h] | int(0) %}
        {% if code <= 1 %}    CLEAR
        {% elif code <= 3 %}  PARTLY_CLOUDY
        {% elif code <= 48 %} FOGGY
        {% elif code <= 67 %} RAINY
        {% elif code <= 77 %} SNOWY
        {% elif code <= 82 %} SHOWERY
        {% else %}            STORMY
        {% endif %}
      {% endif %}

  - name: AXLE Degree Days Today
    unique_id: axle_degree_days_today
    unit_of_measurement: "°C·d"
    state: >
      {% set low = states('sensor.axle_ambient_temp_forecast_low') | float(10) %}
      {% set high = states('sensor.axle_ambient_temp_forecast_high') | float(15) %}
      {% set mean = (low + high) / 2 %}
      {{ [15.5 - mean, 0] | max | round(2) }}


# ═══════════════════════════════════════════════════════════════
# SECTION 5 — AXLE DECISION VISUALISATION SENSORS
# ═══════════════════════════════════════════════════════════════

  - name: AXLE Decision Solar kWh
    unique_id: axle_decision_solar_kwh
    unit_of_measurement: "kWh"
    state: >
      {% set v = state_attr('sensor.axle_charge_decision', 'solar_kwh') %}
      {{ v | float(0) | round(2) if v is not none else 0 }}

  - name: AXLE Decision Load kWh
    unique_id: axle_decision_load_kwh
    unit_of_measurement: "kWh"
    state: >
      {% set v = state_attr('sensor.axle_charge_decision', 'load_kwh') %}
      {{ v | float(0) | round(2) if v is not none else 0 }}

  - name: AXLE Decision Min SOC
    unique_id: axle_decision_min_soc
    unit_of_measurement: "%"
    state: >
      {% set v = state_attr('sensor.axle_charge_decision', 'min_soc') %}
      {{ v | float(0) | round(1) if v is not none else 0 }}

  - name: AXLE Decision Charge Needed
    unique_id: axle_decision_charge_needed
    state: >
      {% set v = state_attr('sensor.axle_charge_decision', 'charge_needed') %}
      {% if v == true %}YES{% else %}NO{% endif %}

  - name: AXLE Net Energy Tomorrow
    unique_id: axle_net_energy_tomorrow
    unit_of_measurement: "kWh"
    state: >
      {% set solar = state_attr('sensor.axle_charge_decision', 'solar_kwh') | float(0) %}
      {% set load = state_attr('sensor.axle_charge_decision', 'load_kwh') | float(0) %}
      {{ (solar - load) | round(2) }}


# ═══════════════════════════════════════════════════════════════
# SECTION 6 — SIMULATION CURVE SENSORS
# Extracts per-hour predicted SOC from AppDaemon simulation
# allowing ApexCharts to overlay predicted vs actual
# ═══════════════════════════════════════════════════════════════

  - name: AXLE Simulation Min SOC
    unique_id: axle_simulation_min_soc
    unit_of_measurement: "%"
    state: >
      {% set v = state_attr('sensor.axle_soc_simulation_curve', 'min_soc_predicted') %}
      {{ v | float(0) | round(1) if v is not none else 0 }}

  - name: AXLE Simulation Max SOC
    unique_id: axle_simulation_max_soc
    unit_of_measurement: "%"
    state: >
      {% set v = state_attr('sensor.axle_soc_simulation_curve', 'max_soc_predicted') %}
      {{ v | float(0) | round(1) if v is not none else 0 }}

  - name: AXLE Simulation Predicted SOC Now
    unique_id: axle_simulation_predicted_soc_now
    unit_of_measurement: "%"
    state: >
      {% set curve = state_attr('sensor.axle_soc_simulation_curve', 'curve') %}
      {% if curve is none or curve | length == 0 %}
        0
      {% else %}
        {% set h = now().hour %}
        {% set date = state_attr('sensor.axle_soc_simulation_curve', 'decision_date') %}
        {% set today = now().strftime('%Y-%m-%d') %}
        {% if date == today %}
          {% set point = curve | selectattr('t', 'search', today ~ 'T' ~ '%02d'|format(h)) | list %}
          {% if point | length > 0 %}
            {{ point[0].soc | round(1) }}
          {% else %}
            0
          {% endif %}
        {% else %}
          0
        {% endif %}
      {% endif %}

  - name: AXLE Simulation Solar Forecast
    unique_id: axle_simulation_solar_forecast
    unit_of_measurement: "kWh"
    state: >
      {% set v = state_attr('sensor.axle_soc_simulation_curve', 'solar_forecast') %}
      {{ v | float(0) | round(2) if v is not none else 0 }}

  - name: AXLE Simulation Load Forecast
    unique_id: axle_simulation_load_forecast
    unit_of_measurement: "kWh"
    state: >
      {% set v = state_attr('sensor.axle_soc_simulation_curve', 'load_forecast') %}
      {{ v | float(0) | round(2) if v is not none else 0 }}
